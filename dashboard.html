<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — GST Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-header">
        <div class="logo">GST Portal</div>
        <div class="user">
            <span class="user-name" id="userName"></span>
            <a href="/profile.html">Settings</a>
            <a href="/logout">Logout</a>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <div>
                <h1>Dashboard</h1>
                <p>Manage and track your GST filings</p>
            </div>
            <button class="btn btn-secondary" onclick="toggleForm()">+ File New Return</button>
        </div>

        <!-- Stats Cards -->
        <div class="dashboard-cards">
            <div class="card blue">
                <div class="card-icon">💰</div>
                <h3>Total Income</h3>
                <div class="card-value" id="income">₹ —</div>
            </div>
            <div class="card orange">
                <div class="card-icon">📊</div>
                <h3>Total GST Paid</h3>
                <div class="card-value" id="gst">₹ —</div>
            </div>
            <div class="card green">
                <div class="card-icon">📋</div>
                <h3>Returns Filed</h3>
                <div class="card-value" id="returns">—</div>
            </div>
        </div>

        <!-- GST Form Panel -->
        <div id="gstForm" class="panel" style="display:none;">
            <div class="panel-header">
                <h2>File GST Return</h2>
                <button class="btn btn-outline" onclick="toggleForm()" style="width:auto; padding:6px 14px;">Cancel</button>
            </div>

            <div id="form-alert"></div>

            <form id="gstReturnForm" action="/calculate" method="POST" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="gst_number">GSTIN</label>
                        <input type="text" id="gst_number" name="gst_number"
                               placeholder="e.g. 22AAAAA0000A1Z5"
                               maxlength="15" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="income">Business Income (₹)</label>
                        <input type="number" id="income_field" name="income"
                               placeholder="e.g. 100000" step="0.01" min="1" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="gst_rate">GST Rate</label>
                        <select name="gst_rate" id="gst_rate" required>
                            <option value="">Select rate…</option>
                            <option value="0.05">5% — Essential goods</option>
                            <option value="0.12">12% — Standard goods</option>
                            <option value="0.18">18% — Services / most goods</option>
                            <option value="0.28">28% — Luxury goods</option>
                        </select>
                    </div>
                    <div class="form-group" style="display:flex; flex-direction:column; justify-content:flex-end;">
                        <div id="gst-preview" class="alert alert-info" style="display:none; margin-bottom:0;">
                            Estimated GST: <strong id="preview-amount">₹0</strong>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitGst" style="max-width:220px;">Submit GST Return</button>
            </form>
        </div>

        <!-- Records Table -->
        <div class="panel">
            <div class="panel-header">
                <h2>Recent Filings</h2>
            </div>
            <div id="records-container">
                <div class="empty-state">
                    <div class="empty-icon">📄</div>
                    <p>Loading your records…</p>
                </div>
            </div>
        </div>
    </div>

<script>
    // ─── Auth guard ──────────────────────────────────────────────
    async function init() {
        const resp = await fetch('/session-check');
        const data = await resp.json();
        if (!data.authenticated) return window.location.href = '/login.html';
        document.getElementById('userName').textContent = data.name;
        loadStats();
    }

    // ─── Toggle form ─────────────────────────────────────────────
    function toggleForm() {
        const form = document.getElementById('gstForm');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    // ─── Live GST preview ─────────────────────────────────────────
    const incomeField = document.getElementById('income_field');
    const rateField   = document.getElementById('gst_rate');
    const preview     = document.getElementById('gst-preview');
    const previewAmt  = document.getElementById('preview-amount');

    function updatePreview() {
        const income = parseFloat(incomeField.value);
        const rate   = parseFloat(rateField.value);
        if (income > 0 && rate > 0) {
            preview.style.display = 'block';
            previewAmt.textContent = '₹' + (income * rate).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        } else {
            preview.style.display = 'none';
        }
    }

    incomeField.addEventListener('input', updatePreview);
    rateField.addEventListener('change', updatePreview);

    // ─── Client-side GSTIN validation ────────────────────────────
    document.getElementById('gstReturnForm').addEventListener('submit', (e) => {
        const gstin = document.getElementById('gst_number').value.trim();
        const gstinRegex = /^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/;
        const alertEl = document.getElementById('form-alert');

        if (!gstinRegex.test(gstin)) {
            e.preventDefault();
            alertEl.innerHTML = '<div class="alert alert-error">Invalid GSTIN format. Example: 22AAAAA0000A1Z5</div>';
            return;
        }
        alertEl.innerHTML = '';

        const btn = document.getElementById('submitGst');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Submitting…';
    });

    // ─── Load stats & records ─────────────────────────────────────
    function fmt(n) {
        return '₹ ' + parseFloat(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function loadStats() {
        fetch('/dashboard-data')
            .then(r => r.json())
            .then(data => {
                document.getElementById('income').textContent  = fmt(data.total_income  || 0);
                document.getElementById('gst').textContent     = fmt(data.total_gst     || 0);
                document.getElementById('returns').textContent = data.total_returns || 0;

                const container = document.getElementById('records-container');

                if (!data.records || data.records.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📄</div>
                            <p>No filings yet. Click <strong>File New Return</strong> to get started.</p>
                        </div>`;
                    return;
                }

                let rows = data.records.map(r => {
                    const rate = ((r.gst_amount / r.income) * 100).toFixed(0);
                    const date = new Date(r.created_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
                    return `
                        <tr>
                            <td><code style="font-size:0.85rem;">${r.gst_number}</code></td>
                            <td>${fmt(r.income)}</td>
                            <td>${fmt(r.gst_amount)}</td>
                            <td><span class="badge badge-orange">${rate}%</span></td>
                            <td style="color:var(--muted); font-size:0.85rem;">${date}</td>
                        </tr>`;
                }).join('');

                container.innerHTML = `
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>GSTIN</th>
                                    <th>Income</th>
                                    <th>GST Amount</th>
                                    <th>Rate</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>`;
            })
            .catch(() => {
                document.getElementById('records-container').innerHTML =
                    '<div class="alert alert-error">Failed to load data. Please refresh.</div>';
            });
    }

    init();
</script>
</body>
</html>
