<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — GST Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-header">
        <div class="logo">GST Portal</div>
        <div class="user">
            <span class="user-name">Admin</span>
            <a href="profile.html">Profile</a>
            <a href="/logout">Logout</a>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <div>
                <h1>Admin Panel</h1>
                <p>View all GST records across all users</p>
            </div>
            <div id="summary-badge"></div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h2>All GST Records</h2>
                <input type="text" id="searchBox"
                       placeholder="Search by name, email or GSTIN…"
                       style="width:240px; margin-bottom:0;"
                       aria-label="Search records">
            </div>

            <div id="data-container">
                <div class="empty-state">
                    <div class="empty-icon">⏳</div>
                    <p>Loading records…</p>
                </div>
            </div>
        </div>
    </div>

<script>
    let allData = [];

    /* ─── Helpers ──────────────────────────────────────────────── */
    function fmt(n) {
        return '₹' + parseFloat(n).toLocaleString('en-IN', { minimumFractionDigits: 2 });
    }

    function fmtDate(raw) {
        if (!raw) return '—';
        const d = new Date(raw);
        return isNaN(d.getTime())
            ? '—'
            : d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    /* ─── Init ─────────────────────────────────────────────────── */
    async function init() {
        try {
            const sessionResp = await fetch('/session-check');
            if (!sessionResp.ok) throw new Error('Session error');
            const session = await sessionResp.json();

            if (!session.authenticated) {
                window.location.href = '/login.html';
                return;
            }

            if (!session.is_admin) {
                document.querySelector('.container').innerHTML =
                    '<div class="alert alert-error" style="margin-top:32px;">⛔ Access Denied: Admin only area.</div>';
                return;
            }

            loadData();
        } catch {
            window.location.href = '/login.html';
        }
    }

    /* ─── Load Data ────────────────────────────────────────────── */
    async function loadData() {
        try {
            const resp = await fetch('/admin-data');
            if (resp.status === 403) throw new Error('Forbidden');
            if (!resp.ok) throw new Error('Server error');
            allData = await resp.json();

            const total = allData.reduce((s, r) => s + (parseFloat(r.gst_amount) || 0), 0);
            document.getElementById('summary-badge').innerHTML =
                `<span class="badge badge-green">${allData.length} records &middot; ${fmt(total)} total GST</span>`;

            renderTable(allData);
        } catch (err) {
            document.getElementById('data-container').innerHTML =
                `<div class="alert alert-error">
                    ${err.message === 'Forbidden'
                        ? '⛔ Access Denied: You do not have permission to view this data.'
                        : 'Failed to load records. Please refresh the page.'}
                </div>`;
        }
    }

    /* ─── Render Table ─────────────────────────────────────────── */
    function renderTable(data) {
        const container = document.getElementById('data-container');

        if (data.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🔍</div>
                    <p>No records found matching your search.</p>
                </div>`;
            return;
        }

        const rows = data.map(r => `
            <tr>
                <td><strong>${escapeHtml(r.name || '—')}</strong></td>
                <td style="color:var(--muted); font-size:0.85rem;">${escapeHtml(r.email || '—')}</td>
                <td><code style="font-size:0.85rem;">${escapeHtml(r.gst_number || '—')}</code></td>
                <td>${fmt(r.income || 0)}</td>
                <td><strong>${fmt(r.gst_amount || 0)}</strong></td>
                <td style="color:var(--muted); font-size:0.85rem;">${fmtDate(r.created_at)}</td>
            </tr>`).join('');

        container.innerHTML = `
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>GSTIN</th>
                            <th>Income</th>
                            <th>GST Amount</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
    }

    /* ─── Search filter ────────────────────────────────────────── */
    let searchTimer;
    document.getElementById('searchBox').addEventListener('input', function () {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            const q = this.value.toLowerCase().trim();
            if (!q) {
                renderTable(allData);
                return;
            }
            const filtered = allData.filter(r =>
                (r.name       || '').toLowerCase().includes(q) ||
                (r.gst_number || '').toLowerCase().includes(q) ||
                (r.email      || '').toLowerCase().includes(q)
            );
            renderTable(filtered);
        }, 200); // debounce
    });

    init();
</script>
</body>
</html>
